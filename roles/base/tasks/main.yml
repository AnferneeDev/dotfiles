---
- name: Update apt cache (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install core system packages (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name:
      - build-essential
      - curl
      - wget
      - git
      - gnupg
      - apt-transport-https
      - ca-certificates
      - python3
      - python3-pip
      - jq
      - unzip
      - ripgrep
      - fd-find
      - zsh
      - tmux
      - fontconfig
    state: present
  when: ansible_os_family == "Debian"

- name: Install core system packages (RedHat/Amazon Linux)
  become: true
  ansible.builtin.dnf:
    name:
      - gcc
      - gcc-c++
      - make
      - curl
      - wget
      - git
      - gnupg2
      - ca-certificates
      - python3
      - python3-pip
      - jq
      - unzip
      - zsh
      - tmux
      - fontconfig
    state: present
  when: ansible_os_family == "RedHat"

# Install ripgrep from GitHub binary if RedHat and not present
- name: Check if ripgrep is installed
  ansible.builtin.command: rg --version
  register: rg_check
  changed_when: false
  failed_when: false
  when: ansible_os_family == "RedHat"

- name: Install ripgrep from binary (RedHat)
  become: true
  ansible.builtin.shell: |
    curl -Lo /tmp/ripgrep.tar.gz https://github.com/BurntSushi/ripgrep/releases/download/14.1.0/ripgrep-14.1.0-x86_64-unknown-linux-musl.tar.gz
    tar -xf /tmp/ripgrep.tar.gz -C /tmp
    mv /tmp/ripgrep-14.1.0-x86_64-unknown-linux-musl/rg /usr/local/bin/rg
    chmod +x /usr/local/bin/rg
  when: ansible_os_family == "RedHat" and rg_check.rc != 0

# Install fd from GitHub binary if RedHat and not present
- name: Check if fd is installed
  ansible.builtin.command: fd --version
  register: fd_check
  changed_when: false
  failed_when: false
  when: ansible_os_family == "RedHat"

- name: Install fd from binary (RedHat)
  become: true
  ansible.builtin.shell: |
    curl -Lo /tmp/fd.tar.gz https://github.com/sharkdp/fd/releases/download/v10.1.0/fd-v10.1.0-x86_64-unknown-linux-musl.tar.gz
    tar -xf /tmp/fd.tar.gz -C /tmp
    mv /tmp/fd-v10.1.0-x86_64-unknown-linux-musl/fd /usr/local/bin/fd
    chmod +x /usr/local/bin/fd
    ln -sf /usr/local/bin/fd /usr/local/bin/fdfind
  when: ansible_os_family == "RedHat" and fd_check.rc != 0

