---
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install core system packages
  become: true
  ansible.builtin.apt:
    name:
      - build-essential
      - curl
      - wget
      - git
      - gnupg
      - apt-transport-https
      - ca-certificates
      - python3
      - python3-pip
      - jq
      - unzip
      - ripgrep
      - fd-find
      - zsh
      - tmux
    state: present
